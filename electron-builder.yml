appId: com.kibo.pet
productName: Kibo
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src'
  - '!docs'
  - '!tools'
  - '!.superpowers'
  # .claude/ 是 Claude Code 的工具目录,里面可能有手动开的 git worktree(比如
  # .claude/worktrees/<branch>/),worktree 内会有真机测试导入的完整宠物包
  # (带 GPT-SoVITS/ONNX 语音模型,几百 MB 级)。根目录的 pets/**/* 排除规则管不到
  # 这层嵌套路径,files 默认扫描会把整个 .claude 树打进 app.asar。
  - '!.claude/**/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json}'
  - '!{README.md,PROGRESS.md,CLAUDE.md,pnpm-lock.yaml}'
  - '!**/*.test.*'
  # pets/ 只应该通过下面的 extraResources 打包(且只带 .keep 占位,不带任何真实宠物包)。
  # 这里必须显式排除,否则 files 默认把整个项目目录(含磁盘上未纳入 git 的真实宠物包,
  # 比如带着几百 MB ONNX/GPT-SoVITS 模型文件的 pets/alice)整个扫进 app.asar。
  - '!pets/**/*'
  # 项目根目录下这几个都是磁盘上真机测试留下的临时产物(未纳入 git,不是运行时需要的文件):
  # GenieData/ 是某次手动跑 genie_server.py 时没指定工作目录、genie_tts 自己按默认相对路径
  # 下载到这儿的基础模型缓存(几百 MB);Reference/ 是 Alice 语音包的原始参考音频/文本素材;
  # .cache/ 是某个工具的缓存目录。files 的默认扫描规则本来就会把项目目录下任何没显式排除的
  # 东西打进 app.asar,这几条和上面的 pets/ 是同一类问题,必须显式排除。
  - '!GenieData/**/*'
  - '!Reference/**/*'
  - '!.cache/**/*'
asarUnpack:
  - '**/node_modules/playwright-core/**'
# 运行时资源:主进程用 process.resourcesPath/<name> 读取。
# - pets: 不带任何真实宠物包(仅 .keep 占位),用户需在设置里手动导入,导入后播种到 userData。
# - skills: 产品运行时技能(全局只读)。
# - resources: 托盘图标 tray.png(shell 从 process.resourcesPath/resources/tray.png 读)。
extraResources:
  # 不再默认打包任何真实宠物包(见 docs/superpowers/specs/2026-07-10-icon-and-no-bundled-pets-design.md):
  # 只保留 pets/.keep 让目录存在,首次启动零宠物包时 startShell 会拉起设置窗口引导用户导入。
  - from: pets
    to: pets
    filter:
      - '!**/*'
      - '.keep'
  - from: skills
    to: skills
  - from: resources
    to: resources
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
